{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow-sm mt-4 mb-5">
            <div class="card-header bg-dark text-white">
                <h4 class="mb-0">➕ 發布新活動</h4>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('event.create_event') }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">活動名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" required>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="start_time" class="form-label">開始時間 <span class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" id="start_time" name="start_time" required>
                        </div>
                        <div class="col-md-6">
                            <label for="end_time" class="form-label">結束時間 <span class="text-danger">*</span></label>
                            <input type="datetime-local" class="form-control" id="end_time" name="end_time" required>
                        </div>
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label for="location" class="form-label">活動地點 <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="location" name="location" required>
                        </div>
                        <div class="col-md-6">
                            <label for="capacity" class="form-label">開放名額上限 <span class="text-danger">*</span></label>
                            <input type="number" class="form-control" id="capacity" name="capacity" min="1" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description" class="form-label">活動說明</label>
                        <textarea class="form-control" id="description" name="description" rows="4"></textarea>
                    </div>
                    <div class="mb-4">
                        <label for="custom_form_schema" class="form-label">表單自定欄位設定 (使用 JSON 格式)</label>
                        <textarea class="form-control" id="custom_form_schema" name="custom_form_schema" rows="2" placeholder='{"questions": ["請問飲食習慣？"]}'></textarea>
                        <div class="form-text">進階功能：未來供動態表單產生器所使用之 Schema。</div>
                    </div>
                    <div class="d-flex justify-content-end">
                        <a href="{{ url_for('main.index') }}" class="btn btn-outline-secondary me-2">取消</a>
                        <button type="submit" class="btn btn-primary">送出發布</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
